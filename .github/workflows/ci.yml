name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-backend:
    name: Lint Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check api/src/

  lint-frontend:
    name: Lint Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: app
        run: bunx tsc --noEmit

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Copy env for build
        run: cp .env.example .env

      - name: Build images
        run: docker compose build

  migrations-check:
    name: Check Migrations
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Copy env for services
        run: cp .env.example .env

      - name: Start database
        run: docker compose up -d db
        env:
          POSTGRES_USER: template_user
          POSTGRES_PASSWORD: template_dev_password
          POSTGRES_DB: template_db

      - name: Wait for database
        run: |
          for i in $(seq 1 30); do
            docker compose exec -T db pg_isready -U template_user && break
            sleep 1
          done

      - name: Run migrations
        run: docker compose run --rm api alembic upgrade head

      - name: Check no pending migrations
        run: docker compose run --rm api alembic check

      - name: Cleanup
        if: always()
        run: docker compose down -v
