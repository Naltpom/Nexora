
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-backend:
    name: Lint Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        if: ${{ !env.ACT }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('api/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-

      - name: Install ruff and pip-audit
        run: pip install ruff pip-audit

      - name: Run ruff check
        run: ruff check api/src/

      - name: Audit Python dependencies
        continue-on-error: true
        run: pip-audit -r api/requirements.txt

  lint-frontend:
    name: Lint Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache Bun dependencies
        if: ${{ !env.ACT }}
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('app/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: app
        run: bunx tsc --noEmit

      - name: List frontend dependencies
        working-directory: app
        continue-on-error: true
        run: bun pm ls --all 2>/dev/null | head -50 || true

  lint-scss:
    name: Lint SCSS (Stylelint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"

      - name: Cache Bun dependencies
        if: ${{ !env.ACT }}
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('app/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Run stylelint
        working-directory: app
        run: bun run lint:scss

  # ── Security scans (parallel, non-blocking) ──────────────────────
  security-scan:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    if: ${{ !github.event.act }}
    needs: [lint-backend, lint-frontend, lint-scss]
    continue-on-error: true
    env:
      COMPOSE_PROJECT_NAME: template_02
    steps:
      - uses: actions/checkout@v4

      - name: Copy env for build
        run: cp .env.example .env

      - name: Build images
        run: docker compose -f docker-compose.yml build

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan API image
        run: trivy image --severity CRITICAL,HIGH --ignore-unfixed --exit-code 0 template_02-api:latest

      - name: Scan App image
        run: trivy image --severity CRITICAL,HIGH --ignore-unfixed --exit-code 0 template_02-app:latest

  # ── Build, migrations, smoke tests ───────────────────────────────
  build-and-check:
    name: Build & Check Migrations
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend, lint-scss]
    env:
      COMPOSE_PROJECT_NAME: template_02
    steps:
      - uses: actions/checkout@v4

      - name: Copy env for build
        run: cp .env.example .env

      - name: Build images
        run: docker compose -f docker-compose.yml build

      - name: Start database, PgBouncer and Redis
        run: docker compose -f docker-compose.yml up -d db pgbouncer redis

      - name: Wait for database
        run: |
          for i in $(seq 1 30); do
            docker compose -f docker-compose.yml exec -T db pg_isready && break
            sleep 1
          done

      - name: Wait for PgBouncer
        run: |
          for i in $(seq 1 15); do
            docker compose -f docker-compose.yml exec -T pgbouncer pg_isready -h 127.0.0.1 -p 6432 && break
            sleep 1
          done

      - name: Wait for Redis
        run: |
          for i in $(seq 1 15); do
            docker compose -f docker-compose.yml exec -T redis redis-cli ping && break
            sleep 1
          done

      - name: Run migrations (direct DB, bypassing PgBouncer)
        run: docker compose -f docker-compose.yml run --rm -e POSTGRES_HOST=db -e POSTGRES_PORT=5432 api alembic -c alembic/alembic.ini upgrade head

      - name: Check no pending migrations (direct DB)
        run: docker compose -f docker-compose.yml run --rm -e POSTGRES_HOST=db -e POSTGRES_PORT=5432 api alembic -c alembic/alembic.ini check

      - name: Verify worker starts
        run: |
          docker compose -f docker-compose.yml up -d worker
          for i in $(seq 1 15); do
            STATE=$(docker compose -f docker-compose.yml ps worker --format '{{.State}}' 2>/dev/null)
            if [ "$STATE" = "running" ]; then
              echo "Worker is running (attempt $i)"
              docker compose -f docker-compose.yml logs worker 2>&1 | tail -5
              exit 0
            fi
            echo "Waiting for worker... (attempt $i, state: $STATE)"
            sleep 1
          done
          echo "Worker failed to start within 15 seconds"
          docker compose -f docker-compose.yml logs worker 2>&1
          exit 1

      # ── Smoke Tests ────────────────────────────────────────────────

      - name: Start full stack
        run: docker compose -f docker-compose.yml up -d

      - name: Wait for API and App healthy
        run: |
          for pair in "api:template02_api" "app:template02_app"; do
            svc="${pair%%:*}"
            ctr="${pair##*:}"
            echo "Waiting for $svc ($ctr)..."
            for i in $(seq 1 60); do
              status=$(docker inspect --format='{{.State.Health.Status}}' $ctr 2>/dev/null)
              [ "$status" = "healthy" ] && echo "$svc ready" && break
              sleep 2
            done
            if [ "$status" != "healthy" ]; then
              echo "$svc failed to become healthy (status: $status)"
              docker compose -f docker-compose.yml logs $svc 2>&1 | tail -30
              exit 1
            fi
          done

      - name: Create admin user for tests
        run: |
          docker compose -f docker-compose.yml exec -T api python -c "
          from src.core._identity.models import User, Role, UserRole
          from src.core.security import hash_password
          from src.core.config import settings
          from sqlalchemy import create_engine, select
          from sqlalchemy.orm import Session

          engine = create_engine(settings.database_url_sync)
          with Session(engine) as db:
              admin = db.execute(select(User).where(User.email == settings.DEFAULT_ADMIN_EMAIL.lower())).scalar_one_or_none()
              if not admin:
                  admin = User(
                      email=settings.DEFAULT_ADMIN_EMAIL.lower(),
                      first_name='CI', last_name='Admin',
                      password_hash=hash_password('CITestAdmin1A'),
                      auth_source='local', must_change_password=False, is_active=True,
                      email_verified=True,
                  )
                  db.add(admin)
                  db.commit()
                  db.refresh(admin)
              else:
                  admin.password_hash = hash_password('CITestAdmin1A')
                  admin.email_verified = True
                  admin.must_change_password = False
                  db.commit()
              role = db.execute(select(Role).where(Role.slug == settings.SUPER_ADMIN_ROLE_SLUG)).scalar_one_or_none()
              if role:
                  existing = db.execute(select(UserRole).where(UserRole.user_id == admin.id, UserRole.role_id == role.id)).scalar_one_or_none()
                  if not existing:
                      db.add(UserRole(user_id=admin.id, role_id=role.id))
                      db.commit()
          engine.dispose()
          "

      - name: Run backend smoke tests (pytest)
        run: |
          docker cp api/tests template02_api:/app/tests
          docker cp api/pytest.ini template02_api:/app/pytest.ini
          docker cp api/requirements-test.txt template02_api:/app/requirements-test.txt
          docker compose -f docker-compose.yml exec -T api sh -c \
            "pip install -q -r requirements-test.txt && python -m pytest tests/ -v --tb=short"

      - name: Generate Playwright auth state
        run: |
          docker cp api/tests/generate_auth_state.py template02_api:/app/tests/generate_auth_state.py
          docker compose -f docker-compose.yml exec -T -e PLAYWRIGHT_ORIGIN=http://localhost:5472 api \
            python -m tests.generate_auth_state > app/tests/.auth-state.json

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        working-directory: app
        run: |
          npm install @playwright/test
          npx playwright install chromium
          npx playwright install-deps chromium

      - name: Run frontend smoke tests (Playwright)
        working-directory: app
        run: BASE_URL=http://localhost:5472 npx playwright test --reporter=list

      # ── Cleanup ─────────────────────────────────────────────────

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yml down -v
