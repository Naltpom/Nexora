name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-backend:
    name: Lint Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check api/src/

  lint-frontend:
    name: Lint Frontend (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      - name: Type check
        working-directory: app
        run: bunx tsc --noEmit

  build-and-check:
    name: Build & Check Migrations
    runs-on: ubuntu-latest
    needs: [lint-backend, lint-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Copy env for build
        run: cp .env.example .env

      - name: Build images
        run: docker compose -f docker-compose.yml build

      - name: Start database and Redis
        run: docker compose -f docker-compose.yml up -d db redis

      - name: Wait for database
        run: |
          for i in $(seq 1 30); do
            docker compose -f docker-compose.yml exec -T db pg_isready && break
            sleep 1
          done

      - name: Wait for Redis
        run: |
          for i in $(seq 1 15); do
            docker compose -f docker-compose.yml exec -T redis redis-cli ping && break
            sleep 1
          done

      - name: Run migrations
        run: docker compose -f docker-compose.yml run --rm api alembic -c alembic/alembic.ini upgrade head

      - name: Check no pending migrations
        run: docker compose -f docker-compose.yml run --rm api alembic -c alembic/alembic.ini check

      - name: Verify worker starts
        run: |
          docker compose -f docker-compose.yml up -d worker
          sleep 3
          docker compose -f docker-compose.yml logs worker 2>&1 | tail -5
          docker compose -f docker-compose.yml ps worker --format '{{.State}}' | grep -q running

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yml down -v
