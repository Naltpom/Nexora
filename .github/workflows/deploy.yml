name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "ssh"
        type: choice
        options:
          - ssh
          - cloud
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - recette
          - staging
          - production

  # Uncomment to auto-deploy after successful CI on main:
  # workflow_run:
  #   workflows: ["CI"]
  #   types: [completed]
  #   branches: [main]

jobs:
  # ─── SSH Deployment (VPS / Dedicated Server) ─────────────────────
  deploy-ssh:
    name: Deploy via SSH
    if: inputs.target == 'ssh'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.APP_DIR || '/app' }}
            COMPOSE="docker compose -f docker-compose.yml -f docker-compose.prod.yml"

            echo "=== Pull latest code ==="
            git pull origin main

            echo "=== Build new images (without stopping running containers) ==="
            $COMPOSE build

            echo "=== Run migrations BEFORE switching to new code ==="
            $COMPOSE run --rm -e POSTGRES_HOST=db -e POSTGRES_PORT=5432 api alembic -c alembic/alembic.ini upgrade head

            echo "=== Rolling update: recreate services one by one ==="
            $COMPOSE up -d --no-deps --force-recreate api

            echo "=== Wait for API to be healthy ==="
            for i in $(seq 1 30); do
              if $COMPOSE exec -T api python -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')" 2>/dev/null; then
                echo "API is healthy (attempt $i)"
                break
              fi
              echo "Waiting for API health... (attempt $i)"
              sleep 2
            done

            $COMPOSE up -d --no-deps --force-recreate worker
            $COMPOSE up -d --no-deps --force-recreate app
            $COMPOSE up -d --no-deps --force-recreate nginx

            echo "=== Cleanup old images ==="
            docker image prune -f

            echo "=== Deployment complete ==="
            $COMPOSE ps

  # ─── Cloud Deployment (Container Services) ───────────────────────
