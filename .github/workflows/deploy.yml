name: Deploy

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deployment target"
        required: true
        default: "ssh"
        type: choice
        options:
          - ssh
          - cloud
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

  # Uncomment to auto-deploy after successful CI on main:
  # workflow_run:
  #   workflows: ["CI"]
  #   types: [completed]
  #   branches: [main]

jobs:
  # ─── SSH Deployment (VPS / Dedicated Server) ─────────────────────
  deploy-ssh:
    name: Deploy via SSH
    if: inputs.target == 'ssh'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.APP_DIR || '/app' }}
            git pull origin main
            docker compose down
            docker compose up -d --build
            docker compose exec -T api alembic upgrade head
            echo "Deployment complete"

  # ─── Cloud Deployment (Container Services) ───────────────────────
