# ============================================================
# Template Configuration — Overwritten on template update
# Project-specific overrides go in config.custom.yaml
# ============================================================

app:
  name: "Kertios Template"
  version: "2026.02.21"

# Default feature states (true = active by default)
features:
  notification: true
  notification.email: true
  notification.push: false
  notification.webhook: true
  sso: true
  sso.google: false
  sso.github: false
  mfa: true
  mfa.totp: true
  mfa.email: true
  preference: true
  preference.theme: true
  preference.didacticiel: true
  preference.couleur: true
  rgpd: true
  rgpd.consentement: true
  rgpd.registre: true
  rgpd.droits: true
  rgpd.export: true
  rgpd.politique: true
  rgpd.audit: true

# Feature-specific configuration defaults
notification.email:
  smtp_host: "smtp.office365.com"
  smtp_port: 587
  smtp_use_tls: true

notification.push:
  vapid_subject: "mailto:noreply@example.com"

notification.webhook:
  timeout: 10
  max_retries: 3

sso.google:
  client_id: ""
  client_secret: ""
  redirect_uri: "http://localhost:5472/sso/callback/google"

sso.github:
  client_id: ""
  client_secret: ""
  redirect_uri: "http://localhost:5472/sso/callback/github"

mfa.totp:
  issuer_name: "Kertios Template"

mfa.email:
  code_length: 6
  code_expiry_minutes: 5
