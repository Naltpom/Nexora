services:
  db:
    image: postgres:15
    container_name: template02_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5470:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: template02_redis
    restart: unless-stopped
    ports:
      - "6479:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: template02_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5471:8000"
    volumes:
      - upload_files:/app/uploads
      - rich_text_images:/app/rich_text_images
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: template02_worker
    restart: unless-stopped
    env_file:
      - .env
    command: ["python", "-m", "arq", "src.worker.WorkerSettings"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: template02_app
    restart: unless-stopped
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_ENV=${ENV}
    ports:
      - "5472:3000"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  upload_files:
  rich_text_images:
