version: "3.8"

services:
  db:
    image: postgres:15
    container_name: template02_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5460:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: template02_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5461:8000"
    volumes:
      - ./api/src:/app/src
      - upload_files:/app/uploads
      - rich_text_images:/app/rich_text_images
      - ./alembic:/app/alembic
      - ./alembic/alembic.ini:/app/alembic.ini
      - ./backups:/app/backups
      - ./config.template.yaml:/app/config.template.yaml
      - ./config.custom.yaml:/app/config.custom.yaml
    depends_on:
      db:
        condition: service_healthy

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: template02_app
    restart: unless-stopped
    environment:
      - VITE_API_URL=${VITE_API_URL}
      - VITE_ENV=${ENV}
    ports:
      - "5462:3000"
    volumes:
      - ./app/src:/app/src
      - ./app/public:/app/public
      - ./app/index.html:/app/index.html
      - ./app/vite.config.ts:/app/vite.config.ts
      - ./app/package.json:/app/package.json
    depends_on:
      - api

volumes:
  postgres_data:
  upload_files:
  rich_text_images:
