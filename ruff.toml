# Ruff — Python linter configuration
target-version = "py311"
line-length = 120

[lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
]
ignore = [
    "E501",  # line too long (handled by line-length setting above)
    "E712",  # == True/False — required for SQLAlchemy column comparisons
]

[lint.isort]
known-first-party = ["src"]
